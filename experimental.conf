# Make this 'true' if you want to use the
# sparse image mode upon module installation
USE_SPARSE_IMAGE_METHOD=false

# Make this 'true' if you are providing a pre-made
# ext4 or f2fs image at rootfs.img (skips tar.gz extraction)
USE_PREMADE_IMAGE=false

# Point to raw block devices or image files to mount as chroot rootfs.
# Format: space-separated list of "device[:mountpoint]"
#   - First entry without a mountpoint (or with :/) becomes the rootfs
#   - Additional entries mount at $CHROOT_PATH/mountpoint (e.g., :/data, :/opt)
#   - The device can be a block device or a regular image file
#   - Both ext4 and f2fs are auto-detected
#   - Can be combined with USE_PREMADE_IMAGE=true for image file as rootfs
#
# Examples:
#   IMAGES=/dev/block/by-name/linux_b
#   IMAGES="/dev/block/by-name/linux_system:/system /dev/block/by-name/data:/data"
#   IMAGES="/dev/block/mmcblk0p4 /sdcard/images/extra.img:/opt"
IMAGES=/dev/block/by-name/linux_b

# Filesystem type for sparse image: ext4 or f2fs
# Only used for creating new images (not pre-made ones)
SPARSE_IMAGE_FSTYPE=ext4

# How much size in GB we should allocate
# for the 'rootfs.img' (Default is 8GB)
# Supported values: Any size with the GB unit
SPARSE_IMAGE_SIZE=8

# Isolate chroot in its own network namespace with NAT
# This gives the chroot a separate network stack (veth pair + iptables masquerade)
# The chroot gets a 172.28.X.2 IP (X randomized per boot) and accesses internet via host-side NAT.
# Disable (false) to share the host network stack.
NET_ISOLATION=true

# Optional: pin the third octet for the veth subnet (172.28.X.0/24).
# Example: NET_NS_IP=100 → host=172.28.100.1, chroot=172.28.100.2
# Leave empty or commented out to randomize per boot (avoid conflicts).
NET_NS_IP=
